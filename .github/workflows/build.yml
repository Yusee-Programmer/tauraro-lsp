name: tauraro-lsp Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
          - os: ubuntu-22.04-arm
            platform: linux-arm64
            ext: ""
          - os: windows-latest
            platform: windows-x64
            ext: ".exe"
          - os: macos-latest
            platform: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout tauraro-lsp
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Download the latest tauraroc release for this platform.
      # -------------------------------------------------------
      - name: Download latest tauraroc
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="tauraroc-${{ matrix.platform }}.zip"

          TAG=$(gh release view \
                  --repo tauraro/tauraro \
                  --json tagName \
                  -q '.tagName' 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "error: could not determine latest tauraroc release tag"
            exit 1
          fi
          echo "Latest tauraroc: $TAG"

          mkdir -p tauraroc-dl/
          gh release download "$TAG" \
            --repo tauraro/tauraro \
            --pattern "$ZIP" \
            --dir tauraroc-dl/ \
            --clobber

          mkdir -p tauraroc-install/
          if unzip -oq "tauraroc-dl/$ZIP" -d tauraroc-install/ 2>/dev/null; then
            echo "==> Extracted with unzip"
          else
            echo "==> unzip failed, trying PowerShell Expand-Archive..."
            powershell -Command "Expand-Archive -Force \
              -Path 'tauraroc-dl/$ZIP' \
              -DestinationPath 'tauraroc-install/'"
          fi

          BIN=$(find tauraroc-install -name "tauraroc${{ matrix.ext }}" \
                  ! -path "*/src/*" | head -1)
          if [ -z "$BIN" ]; then
            echo "error: tauraroc${{ matrix.ext }} not found in $ZIP"
            exit 1
          fi
          chmod +x "$BIN" 2>/dev/null || true

          BIN_DIR=$(dirname "$BIN")
          RT_DIR="$(pwd)/$BIN_DIR/runtime"

          if [ "$RUNNER_OS" = "Windows" ]; then
            TAURAROC=$(cygpath -w "$BIN")
            TAURAROC_RT=$(cygpath -w "$RT_DIR")
          else
            TAURAROC="$(pwd)/$BIN"
            TAURAROC_RT="$RT_DIR"
          fi

          echo "TAURAROC=$TAURAROC"       >> "$GITHUB_ENV"
          echo "TAURAROC_RT=$TAURAROC_RT" >> "$GITHUB_ENV"
          echo "Using tauraroc: $TAURAROC"
          echo "Runtime dir:    $TAURAROC_RT"

      # -------------------------------------------------------
      # Emit C and normalise the build directory.
      #
      # Old tauraroc (≤v0.0.3): emits to src/build/  (next to source)
      # New tauraroc (≥v0.0.4): emits to ./build/    (CWD-relative)
      #
      # We normalise both to ./build/ so the GCC step is consistent.
      #
      # Note: tauraro-lsp uses _tr_read_stdin_line / _tr_write_stdout
      # etc. from tauraro_rt.h — no C shim files needed.
      # -------------------------------------------------------
      - name: Emit C from tauraro-lsp source
        shell: bash
        run: |
          "$TAURAROC" src/main.tr --emit c

          # Normalise: old tauraroc emits to src/build/, new to ./build/.
          if [ ! -f "build/main.c" ] && [ -f "src/build/main.c" ]; then
            echo "==> Old tauraroc detected — copying src/build/ → build/"
            mkdir -p build
            cp -r src/build/. build/
          fi

          echo "C files in build/:"
          ls build/*.c build/tauraro_types.h 2>/dev/null | head -20

      - name: Copy runtime header into build dir
        shell: bash
        run: |
          RT="$TAURAROC_RT/tauraro_rt.h"
          if [ ! -f "$RT" ]; then
            RT=$(find "$(dirname "$TAURAROC")" -name "tauraro_rt.h" 2>/dev/null | head -1)
          fi
          if [ -z "$RT" ] || [ ! -f "$RT" ]; then
            echo "error: tauraro_rt.h not found (TAURAROC_RT=$TAURAROC_RT)"
            exit 1
          fi
          cp "$RT" build/tauraro_rt.h
          echo "Copied: $RT -> build/tauraro_rt.h"

      - name: Compile with GCC (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          gcc -O2 -std=c11 -Wno-misleading-indentation -Ibuild \
            build/main.c build/module_*.c \
            build/include/core/alloc.c \
            build/include/std/core/*.c \
            build/include/std/io/*.c build/include/std/io.c \
            build/include/std/string/*.c \
            -o build/tauraro-lsp -lm
          echo "Compiled: build/tauraro-lsp"

      - name: Compile with GCC (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          gcc -O2 -std=c11 -Wno-misleading-indentation -Ibuild \
            build/main.c build/module_*.c \
            build/include/core/alloc.c \
            build/include/std/core/*.c \
            build/include/std/io/*.c build/include/std/io.c \
            build/include/std/string/*.c \
            -o build/tauraro-lsp.exe -lm -lws2_32
          echo "Compiled: build/tauraro-lsp.exe"

      # -------------------------------------------------------
      # Move the binary from build/ to the repo root.
      # Falls back to src/build/ in case an old bootstrap was
      # used that outputs relative to the source file.
      # -------------------------------------------------------
      - name: Place binary at repo root
        shell: bash
        run: |
          if [ -f "build/tauraro-lsp${{ matrix.ext }}" ]; then
            mv "build/tauraro-lsp${{ matrix.ext }}" "./tauraro-lsp${{ matrix.ext }}"
          elif [ -f "src/build/tauraro-lsp${{ matrix.ext }}" ]; then
            echo "==> Fallback: src/build/ → repo root"
            mv "src/build/tauraro-lsp${{ matrix.ext }}" "./tauraro-lsp${{ matrix.ext }}"
          elif [ -f "tauraro-lsp${{ matrix.ext }}" ]; then
            echo "Binary already at repo root."
          else
            echo "error: tauraro-lsp${{ matrix.ext }} not found in build/, src/build/, or CWD"
            ls -la build/ src/build/ 2>/dev/null || true
            exit 1
          fi

      - name: Verify binary
        shell: bash
        run: |
          echo "==> Binary: $(ls -lh tauraro-lsp${{ matrix.ext }})"
          "./tauraro-lsp${{ matrix.ext }}" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauraro-lsp-${{ matrix.platform }}
          path: tauraro-lsp${{ matrix.ext }}

  # -----------------------------------------------------------------
  # Release: triggered only on v* tag pushes after all builds pass.
  # -----------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraro-lsp-linux-x64
          path: release/linux-x64/

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraro-lsp-linux-arm64
          path: release/linux-arm64/

      - name: Download windows-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraro-lsp-windows-x64
          path: release/windows-x64/

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tauraro-lsp-macos-arm64
          path: release/macos-arm64/

      - name: Create release zips
        run: |
          mkdir -p release/assets
          zip -j release/assets/tauraro-lsp-linux-x64.zip   release/linux-x64/tauraro-lsp
          zip -j release/assets/tauraro-lsp-linux-arm64.zip release/linux-arm64/tauraro-lsp
          zip -j release/assets/tauraro-lsp-windows-x64.zip release/windows-x64/tauraro-lsp.exe
          zip -j release/assets/tauraro-lsp-macos-arm64.zip release/macos-arm64/tauraro-lsp

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "tauraro-lsp ${{ github.ref_name }}" \
            --generate-notes \
            release/assets/tauraro-lsp-linux-x64.zip \
            release/assets/tauraro-lsp-linux-arm64.zip \
            release/assets/tauraro-lsp-windows-x64.zip \
            release/assets/tauraro-lsp-macos-arm64.zip
